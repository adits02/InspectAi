{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="aicte-page">
    <div class="form-card">
        <h1 class="section-title">Inspector Login</h1>
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        <form action="{% url 'inspector_check' %}" method="POST" class="form-grid">
            {% csrf_token %}
            <div class="form-group">
                <label for="inspector-user">User ID</label>
                <input type="text" id="inspector-user" name="user_id" required placeholder="Enter your user ID">
            </div>
            <div class="form-group">
                <label for="inspector-pass">Password</label>
                <input type="password" id="inspector-pass" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
    </div>
</div>
{% endblock %}
