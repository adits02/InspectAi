{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="aicte-page">
    <div class="form-card">
        <h1 class="section-title">AICTE Admin Login</h1>
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        <form action="{% url 'aicte_login_check' %}" method="POST" class="form-grid">
            {% csrf_token %}
            <div class="form-group">
                <label for="aicte-user">Username</label>
                <input type="text" id="aicte-user" name="aicte-user" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="login-pass">Password</label>
                <input type="password" id="login-pass" name="login-pass" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
    </div>
</div>
{% endblock %}
